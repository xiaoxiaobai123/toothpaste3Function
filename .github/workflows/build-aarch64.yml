name: Build aarch64

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-aarch64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # GitHub-hosted ARM runner — free for public repositories.
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 binutils

      - name: Install Hikvision MVS SDK (aarch64)
        # Fetched from the build-deps branch, not the main commit, so the
        # SDK doesn't bloat the application source tree. PyInstaller needs
        # /opt/MVS/Samples/aarch64/Python/MvImport on sys.path during
        # analysis to bundle MvCameraControl_class into the binary.
        run: |
          MVS_DEB=MVS-3.0.1_aarch64_20241128.deb
          curl -fLsS -o "$MVS_DEB" \
            "https://raw.githubusercontent.com/${{ github.repository }}/build-deps/${MVS_DEB}"
          ls -la "$MVS_DEB"
          sudo dpkg -i "$MVS_DEB" || sudo apt-get install -fy
          test -d /opt/MVS/Samples/aarch64/Python/MvImport
          test -e /opt/MVS/lib/aarch64/libMvCameraControl.so
          echo "MVCAM_SDK_PATH=/opt/MVS" >> "$GITHUB_ENV"
          echo "MVCAM_COMMON_RUNENV=/opt/MVS/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/opt/MVS/lib/aarch64" >> "$GITHUB_ENV"
          # PyInstaller's static analysis needs MvCameraControl_class.py on
          # sys.path; setup_camera_environment() only runs at execution time.
          echo "PYTHONPATH=/opt/MVS/Samples/aarch64/Python/MvImport" >> "$GITHUB_ENV"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]

      - name: Inject version info
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH="${GITHUB_HEAD_REF}"
          fi
          COMMIT="$(git rev-parse --short HEAD)"
          # Replace the placeholder in core/version.py.
          # Use Python so we don't fight `|` in the type annotation `str | None`.
          python - <<EOF
          import pathlib, re
          p = pathlib.Path("core/version.py")
          text = p.read_text()
          new = re.sub(
              r"^VERSION_INFO: str \| None = None",
              'VERSION_INFO: str | None = "branch=${BRANCH} commit=${COMMIT}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          assert new != text, "VERSION_INFO placeholder not found in core/version.py"
          p.write_text(new)
          EOF
          grep VERSION_INFO core/version.py

      - name: Build with PyInstaller
        run: pyinstaller --clean -y main.spec

      - name: Sanity-check the binary
        # Confirm MvCameraControl_class actually got bundled — without this
        # we wouldn't notice a regression where MVS install silently fails.
        run: |
          file dist/main
          ls -la dist/main
          if strings dist/main | grep -qi "MvCameraControl_class\|MV_CC_CreateHandle"; then
            echo "✓ MVS bindings bundled into binary"
          else
            echo "✗ MVS bindings missing — PyInstaller did not pick up MvCameraControl_class" >&2
            exit 1
          fi

      - name: Smoke-run the binary
        # Boot the binary on the runner with cameras disabled and a fake
        # license matching the runner's hardware fingerprint. This proves
        # all imports resolve at runtime (libMvCameraControl.so loadable,
        # cv2 / numpy / pyModbusTCP all reachable, no missing .so deps).
        # The binary exits cleanly once TaskManager sees no active cameras.
        #
        # Without this step a regression like "MvCameraControl bundled but
        # libMvCameraControl.so missing" would only surface on a real
        # NanoPi after a deploy.
        run: |
          # Generate a license matching this runner's CPU fingerprint so
          # validate_license() passes without modifying the production code.
          PYTHONPATH=. python - <<'EOF'
          from core import license_utils
          cpu_id = license_utils.get_cpu_id()
          if cpu_id and license_utils.generate_license(cpu_id):
              print(f"smoke: license generated for {cpu_id[:24]}...")
          else:
              # On a generic VM /proc/device-tree/model is missing — write
              # a sentinel license that won't validate but lets the binary
              # at least try (it'll exit on the license check, which is
              # what we want for smoke testing imports).
              import hashlib
              with open("license.key", "w") as f:
                  f.write(hashlib.sha256(b"smoke-test").hexdigest())
              print("smoke: dummy license written (license check will fail, that's OK)")
          EOF

          # Disabled-cameras config — TaskManager will start, see no active
          # cameras, log an error, and return cleanly within ~1s.
          cat > config.json <<'EOF'
          {
              "cameras": {
                  "camera1": {"ip": "127.0.0.1", "host_lan": "127.0.0.1", "enabled": false},
                  "camera2": {"ip": "127.0.0.1", "host_lan": "127.0.0.1", "enabled": false}
              },
              "plc": {"ip": "127.0.0.1"}
          }
          EOF

          set +e
          # Allow up to 10s, then SIGTERM if it didn't exit on its own.
          # 124 = timeout fired; anything else is the binary's own exit code.
          timeout 10 ./dist/main
          BIN_RC=$?
          set -e
          echo "Binary exit code: $BIN_RC"

          echo
          echo "=========== my_app.log ==========="
          cat my_app.log
          echo "=================================="

          # Pass criteria: log must contain the version banner. That proves
          # logging + license_utils + plc.codec + processing.* + display_utils
          # all imported without ImportError at runtime.
          if grep -q "program start" my_app.log; then
            echo "✓ Binary started, all imports resolved at runtime"
          else
            echo "✗ Binary did not produce startup banner" >&2
            exit 1
          fi

          # Stash the log under a stable name so the artifact upload picks it up.
          cp my_app.log smoke-run.log

      - name: Upload smoke-run log
        # Keep the log even if the smoke-run step fails — useful for debugging.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-run-log-${{ github.sha }}
          path: smoke-run.log
          if-no-files-found: warn
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: toothpaste3Function-aarch64-${{ github.sha }}
          path: |
            dist/main
            deploy/
            config.example.json
            company_name.png
            README.md
          retention-days: 14
