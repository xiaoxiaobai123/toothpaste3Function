name: Build aarch64

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-aarch64-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # GitHub-hosted ARM runner — free for public repositories.
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 binutils

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]

      - name: Inject version info
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            BRANCH="${GITHUB_HEAD_REF}"
          fi
          COMMIT="$(git rev-parse --short HEAD)"
          # Replace the placeholder in core/version.py
          sed -i "s|^VERSION_INFO: str | None = None|VERSION_INFO: str | None = \"branch=${BRANCH} commit=${COMMIT}\"|" core/version.py
          grep VERSION_INFO core/version.py

      - name: Build with PyInstaller
        run: pyinstaller --clean -y main.spec

      - name: Sanity-check the binary
        run: |
          file dist/main
          ls -la dist/main

      - uses: actions/upload-artifact@v4
        with:
          name: toothpaste3Function-aarch64-${{ github.sha }}
          path: |
            dist/main
            deploy/
            config.example.json
            company_name.png
            README.md
          retention-days: 14
