name: Lint + Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lint-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        # Subpackages without external SDK deps. camera/base.py imports
        # MvCameraControl_class which is only available on hosts with the
        # MVS SDK installed; we skip it on x86 CI.
        run: mypy core plc processing

      - name: Pytest
        run: pytest tests -v --maxfail=1
