name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required by softprops/action-gh-release to upload tarball + auto-notes

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    # Build inside Debian 11 (GLIBC 2.31) — see build-aarch64.yml for the
    # full reasoning. Resulting binary is portable to any Debian 11+ system.
    container: python:3.11-bullseye

    steps:
      - uses: actions/checkout@v4

      - name: Install system libraries
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl libgl1 libglib2.0-0 binutils

      - name: Verify build environment GLIBC baseline
        # Mirrors the same check in build-aarch64.yml — catches any future
        # change to the container directive that would silently ship a
        # binary requiring newer GLIBC than customer NanoPis provide.
        run: |
          LIBPYTHON=$(find /usr/local/lib /usr/lib -name 'libpython3.11.so*' 2>/dev/null | head -1)
          if [ -z "$LIBPYTHON" ]; then
            echo "✗ libpython3.11.so not found — container layout changed?" >&2
            exit 1
          fi
          HIGHEST=$(objdump -T "$LIBPYTHON" | grep -oE 'GLIBC_[0-9]+\.[0-9]+' | sort -uV | tail -1)
          ALLOWED="GLIBC_2.31"
          if [ "$(printf '%s\n%s\n' "$HIGHEST" "$ALLOWED" | sort -V | tail -1)" != "$ALLOWED" ]; then
            echo "✗ libpython at $LIBPYTHON requires $HIGHEST" >&2
            echo "✗ Allowed maximum is $ALLOWED (oldest deploy target = Debian 11)." >&2
            echo "✗ Restore the 'container: python:3.11-bullseye' directive in this workflow." >&2
            exit 1
          fi
          echo "✓ Build env libpython requires only $HIGHEST (≤ $ALLOWED)"

      - name: Install Hikvision MVS SDK (aarch64)
        # Same as build-aarch64.yml — pulled from the build-deps branch so
        # PyInstaller can analyze MvCameraControl_class and bundle it.
        run: |
          MVS_DEB=MVS-3.0.1_aarch64_20241128.deb
          curl -fLsS -o "$MVS_DEB" \
            "https://raw.githubusercontent.com/${{ github.repository }}/build-deps/${MVS_DEB}"
          dpkg -i "$MVS_DEB" || apt-get install -fy
          test -d /opt/MVS/Samples/aarch64/Python/MvImport
          echo "MVCAM_SDK_PATH=/opt/MVS" >> "$GITHUB_ENV"
          echo "MVCAM_COMMON_RUNENV=/opt/MVS/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=/opt/MVS/lib/aarch64" >> "$GITHUB_ENV"
          echo "PYTHONPATH=/opt/MVS/Samples/aarch64/Python/MvImport" >> "$GITHUB_ENV"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]

      - name: Inject version info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          COMMIT="$(git rev-parse --short HEAD)"
          # Use Python so we don't fight `|` in the type annotation `str | None`.
          python - <<EOF
          import pathlib, re
          p = pathlib.Path("core/version.py")
          text = p.read_text()
          new = re.sub(
              r"^VERSION_INFO: str \| None = None",
              'VERSION_INFO: str | None = "release=${TAG} commit=${COMMIT}"',
              text,
              count=1,
              flags=re.MULTILINE,
          )
          assert new != text, "VERSION_INFO placeholder not found in core/version.py"
          p.write_text(new)
          EOF
          grep VERSION_INFO core/version.py

      - name: Build with PyInstaller
        run: pyinstaller --clean -y main.spec

      - name: Build image_updater (C, native aarch64)
        run: |
          cd image_updater
          make clean
          make
          file image_updater
          cp image_updater ../dist/

      - name: Sanity-check the binary
        run: |
          file dist/main
          if strings dist/main | grep -qi "MvCameraControl_class\|MV_CC_CreateHandle"; then
            echo "✓ MVS bindings bundled into binary"
          else
            echo "✗ MVS bindings missing" >&2
            exit 1
          fi

      - name: Bundle release artifacts
        # Wrap the tarball contents in a versioned top-level directory.
        # Without this, `tar -xzf` extracts files into the current working
        # directory — and field operators who run it from /home/pi end up
        # overwriting the live `main` binary, customer config, and ROI
        # files before upgrade.sh can preserve them. The wrapper directory
        # forces a clean extraction site.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIRNAME="toothpaste3Function-${TAG}-aarch64"
          mkdir "$DIRNAME"
          cp dist/main "$DIRNAME/"
          cp dist/image_updater "$DIRNAME/"
          cp -r deploy "$DIRNAME/"
          cp config.example.json "$DIRNAME/"
          cp company_name.png "$DIRNAME/"
          cp README.md "$DIRNAME/"
          tar -czvf "${DIRNAME}.tar.gz" "$DIRNAME"

      - uses: softprops/action-gh-release@v2
        with:
          files: toothpaste3Function-*-aarch64.tar.gz
          generate_release_notes: true
